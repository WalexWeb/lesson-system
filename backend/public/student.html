<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ОРД · Практика</title>
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #f0f4fa 0%, #e6ecf5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* Карточка с эффектом стекла */
        .glass-card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.5) inset;
            padding: 2.5rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .glass-card:hover {
            box-shadow: 0 30px 60px -12px rgba(0, 50, 30, 0.3);
        }

        /* Заголовок */
        .app-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .app-header h1 {
            font-size: 2rem;
            font-weight: 600;
            background: linear-gradient(135deg, #0b2b26, #163832);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .session-badge {
            background: #1e4b3c;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 4px 10px rgba(21, 80, 60, 0.3);
        }

        .session-badge i {
            font-size: 0.9rem;
        }

        /* Поля ввода */
        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1f3d35;
            margin-bottom: 0.3rem;
            letter-spacing: 0.01em;
        }

        .input-group input[type="text"] {
            width: 100%;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.7);
            border: 1.5px solid rgba(70, 110, 100, 0.2);
            border-radius: 20px;
            outline: none;
            transition: all 0.2s ease;
            color: #1a2e28;
        }

        .input-group input[type="text"]:focus {
            border-color: #226655;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(34, 102, 85, 0.15);
        }

        /* Кастомный файловый инпут */
        .file-input-wrapper {
            position: relative;
            margin-top: 0.3rem;
        }

        .file-input-wrapper input[type="file"] {
            position: relative;
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: rgba(255, 255, 255, 0.6);
            border: 1.5px dashed rgba(34, 102, 85, 0.4);
            border-radius: 20px;
            font-size: 0.95rem;
            color: #1f4035;
            cursor: pointer;
            transition: border 0.2s ease, background 0.2s ease;
        }

        .file-input-wrapper input[type="file"]::file-selector-button {
            margin-right: 1rem;
            padding: 0.4rem 1rem;
            background: #226655;
            color: white;
            border: none;
            border-radius: 40px;
            font-weight: 500;
            transition: background 0.2s ease;
            cursor: pointer;
        }

        .file-input-wrapper input[type="file"]:hover {
            border-color: #226655;
            background: rgba(255, 255, 255, 0.8);
        }

        .file-input-wrapper input[type="file"]:hover::file-selector-button {
            background: #1a4f42;
        }

        /* Кнопки */
        .button-primary, .button-secondary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.9rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 14px rgba(0, 40, 30, 0.2);
            width: fit-content;
        }

        .button-primary {
            background: #226655;
            color: white;
        }

        .button-primary:hover:not(:disabled) {
            background: #1b5243;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px #1f4f3f;
        }

        .button-secondary {
            background: rgba(255, 255, 255, 0.8);
            color: #1d4339;
            border: 1px solid rgba(34, 102, 85, 0.3);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .button-secondary:hover {
            background: white;
            border-color: #226655;
        }

        button:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* Сообщения */
        .message {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 1rem 1.4rem;
            border-radius: 50px;
            margin-bottom: 1.5rem;
            font-weight: 500;
            animation: slideIn 0.3s ease;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(6px);
        }

        .message.error {
            background: #fee9e7;
            color: #a5301f;
            border-left: 6px solid #c7422f;
        }

        .message.success {
            background: #e1f7ed;
            color: #146b4e;
            border-left: 6px solid #1d9b73;
        }

        .message i {
            font-size: 1.2rem;
        }

        /* Разделители / отступы */
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
            margin-bottom: 1.5rem;
        }

        hr {
            margin: 2rem 0 1.5rem;
            border: none;
            height: 2px;
            background: linear-gradient(to right, transparent, rgba(34, 102, 85, 0.2), transparent);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Адаптивность */
        @media (max-width: 500px) {
            .glass-card {
                padding: 1.8rem;
            }

            .app-header h1 {
                font-size: 1.6rem;
            }

            .button-primary, .button-secondary {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
    const { useEffect, useState } = React;
    const apiBase = "/api";

    // jsonFetch — без изменений
    async function jsonFetch(url, options) {
        options = options || {};
        const res = await fetch(url, {
            headers: Object.assign(
                {},
                options.body instanceof FormData
                    ? {}
                    : { "Content-Type": "application/json" }
            ),
            ...options,
        });
        if (!res.ok) {
            const txt = await res.text();
            throw new Error(txt || res.statusText);
        }
        const ct = res.headers.get("content-type") || "";
        if (ct.indexOf("application/json") !== -1) {
            return res.json();
        }
        return res.text();
    }

    function StudentApp() {
        const [session, setSession] = useState(null);
        const [studentName, setStudentName] = useState("");
        const [group, setGroup] = useState("");
        const [sending, setSending] = useState(false);
        const [error, setError] = useState("");
        const [success, setSuccess] = useState("");

        useEffect(function () {
            jsonFetch(apiBase + "/session")
                .then(function (s) {
                    setSession(s || null);
                })
                .catch(function () {
                    setError("Сессия ещё не запущена преподавателем.");
                });
        }, []);

        function handleDownloadAssignment() {
            window.location.href = apiBase + "/assignment";
        }

        async function handleSubmit(e) {
            e.preventDefault();
            setError("");
            setSuccess("");
            const fileInput = e.target.elements.file;
            const file = fileInput && fileInput.files && fileInput.files[0];
            if (!file) {
                setError("Выберите файл с решением.");
                return;
            }
            if (!studentName || !group) {
                setError("Укажите ФИО и группу.");
                return;
            }
            setSending(true);
            try {
                const form = new FormData();
                form.append("file", file);
                form.append("studentName", studentName);
                form.append("group", group);
                const res = await fetch(apiBase + "/submit", {
                    method: "POST",
                    body: form,
                });
                if (!res.ok) {
                    throw new Error(await res.text());
                }
                await res.json();
                setSuccess("Файл отправлен преподавателю.");
                fileInput.value = "";
            } catch (err) {
                setError(err.message);
            } finally {
                setSending(false);
            }
        }

        return (
            <div className="glass-card">
                <div className="app-header">
                    <i className="fas fa-flask" style={{ fontSize: '2rem', color: '#226655' }}></i>
                    <h1>Лаборатория ОРД</h1>
                </div>

                {session ? (
                    <div className="session-badge">
                        <i className="fas fa-play"></i> {session.title}
                    </div>
                ) : (
                    <div className="session-badge" style={{ background: '#7f8c8d' }}>
                        <i className="fas fa-pause"></i> Ожидание сессии...
                    </div>
                )}

                <hr />

                {error && (
                    <div className="message error">
                        <i className="fas fa-exclamation-circle"></i> {error}
                    </div>
                )}
                {success && (
                    <div className="message success">
                        <i className="fas fa-check-circle"></i> {success}
                    </div>
                )}

                <div className="flex-row">
                    <button className="button-secondary" type="button" onClick={handleDownloadAssignment}>
                        <i className="fas fa-download"></i> Скачать задание
                    </button>
                </div>

                <form onSubmit={handleSubmit}>
                    <div className="input-group">
                        <label><i className="far fa-user" style={{ marginRight: 6 }}></i> ФИО</label>
                        <input
                            type="text"
                            value={studentName}
                            onChange={(e) => setStudentName(e.target.value)}
                            placeholder="Иванов Иван Иванович"
                        />
                    </div>

                    <div className="input-group">
                        <label><i className="far fa-users"></i> Группа</label>
                        <input
                            type="text"
                            value={group}
                            onChange={(e) => setGroup(e.target.value)}
                            placeholder="П-31"
                        />
                    </div>

                    <div className="input-group">
                        <label><i className="fas fa-file-upload"></i> Файл с решением</label>
                        <div className="file-input-wrapper">
                            <input type="file" name="file" />
                        </div>
                    </div>

                    <div className="flex-row" style={{ marginTop: '2rem' }}>
                        <button className="button-primary" type="submit" disabled={sending}>
                            {sending ? (
                                <React.Fragment>
                                    <i className="fas fa-spinner fa-pulse"></i> Отправка...
                                </React.Fragment>
                            ) : (
                                <React.Fragment>
                                    <i className="fas fa-paper-plane"></i> Отправить преподавателю
                                </React.Fragment>
                            )}
                        </button>
                    </div>
                </form>

                <div style={{ marginTop: '2rem', textAlign: 'center', fontSize: '0.8rem', color: '#6f8b83' }}>
                    <i className="fas fa-shield-alt"></i> Практическое занятие · ОРД
                </div>
            </div>
        );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<StudentApp />);
</script>
</body>
</html>
