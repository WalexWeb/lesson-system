<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Lesson System — Teacher</title>
    <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        margin: 0;
        padding: 24px;
        background: #f5f5f7;
      }
      .card {
        max-width: 960px;
        margin: 0 auto;
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
        padding: 24px 28px;
      }
      h1 {
        margin-top: 0;
      }
      input,
      button {
        font-size: 14px;
      }
      input[type="text"] {
        width: 260px;
        padding: 6px 8px;
        border-radius: 6px;
        border: 1px solid #d0d0d7;
      }
      button {
        padding: 6px 12px;
        border-radius: 6px;
        border: none;
        background: #2563eb;
        color: #fff;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      table {
        border-collapse: collapse;
        width: 100%;
      }
      th,
      td {
        border-bottom: 1px solid #e5e5ef;
        padding: 6px 4px;
        text-align: left;
        font-size: 13px;
      }
      th {
        font-weight: 600;
        color: #4b5563;
      }
      .badge {
        display: inline-block;
        border-radius: 999px;
        background: #eef2ff;
        color: #3730a3;
        padding: 2px 8px;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useState } = React;

      const apiBase = "/api";

      async function jsonFetch(url, options) {
        options = options || {};
        const res = await fetch(url, {
          headers: Object.assign(
            {},
            options.body instanceof FormData
              ? {}
              : { "Content-Type": "application/json" }
          ),
          ...options,
        });
        if (!res.ok) {
          const txt = await res.text();
          throw new Error(txt || res.statusText);
        }
        const ct = res.headers.get("content-type") || "";
        if (ct.indexOf("application/json") !== -1) {
          return res.json();
        }
        return res.text();
      }

      function TeacherApp() {
        const [session, setSession] = useState(null);
        const [title, setTitle] = useState("Lesson");
        const [assignmentName, setAssignmentName] = useState(null);
        const [submissions, setSubmissions] = useState([]);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState("");

        useEffect(function () {
          jsonFetch(apiBase + "/session")
            .then(function (s) {
              setSession(s || null);
            })
            .catch(function () {});
        }, []);

        useEffect(
          function () {
            if (!session) return;
            const socket = io("/teacher");
            socket.on("submissionCreated", function (sub) {
              setSubmissions(function (prev) {
                return prev.concat([sub]);
              });
            });
            return function () {
              socket.disconnect();
            };
          },
          [session],
        );

        useEffect(
          function () {
            if (!session) return;
            jsonFetch(apiBase + "/teacher/submissions")
              .then(function (data) {
                setSubmissions(data || []);
              })
              .catch(function () {});
          },
          [session],
        );

        async function handleCreateSession(e) {
          e.preventDefault();
          setLoading(true);
          setError("");
          try {
            const s = await jsonFetch(apiBase + "/teacher/session", {
              method: "POST",
              body: JSON.stringify({ title: title }),
            });
            setSession(s);
          } catch (err) {
            setError(err.message);
          } finally {
            setLoading(false);
          }
        }

        async function handleUploadAssignment(e) {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          setLoading(true);
          setError("");
          try {
            const form = new FormData();
            form.append("file", file);
            const res = await fetch(apiBase + "/teacher/assignment", {
              method: "POST",
              body: form,
            });
            if (!res.ok) {
              throw new Error(await res.text());
            }
            const data = await res.json();
            setAssignmentName(data.fileName);
          } catch (err) {
            setError(err.message);
          } finally {
            setLoading(false);
          }
        }

        function handleDownloadAll() {
          window.location.href = apiBase + "/teacher/download-all";
        }

        return (
          <div className="card">
            <h1>Lesson System — Преподаватель</h1>
            {error && (
              <div style={{ color: "red", marginBottom: 8 }}>{error}</div>
            )}

            {!session && (
              <form onSubmit={handleCreateSession} style={{ marginBottom: 16 }}>
                <div style={{ marginBottom: 8 }}>
                  <label>
                    Название занятия:&nbsp;
                    <input
                      type="text"
                      value={title}
                      onChange={function (e) {
                        setTitle(e.target.value);
                      }}
                    />
                  </label>
                </div>
                <button type="submit" disabled={loading}>
                  Создать сессию
                </button>
              </form>
            )}

            {session && (
              <div>
                <div style={{ marginBottom: 16 }}>
                  <div>
                    <strong>Сессия:</strong> {session.title}{" "}
                    <span className="badge">код: {session.joinCode}</span>
                  </div>
                  <div style={{ fontSize: 12, color: "#4b5563" }}>
                    Студенты: откройте{" "}
                    <code>
                      http://&lt;IP-преподавателя&gt;:3000/student.html
                    </code>{" "}
                    и введите этот код.
                  </div>
                </div>
                <div style={{ marginBottom: 16 }}>
                  <div style={{ marginBottom: 4 }}>
                    <strong>Файл задания:</strong>{" "}
                    {assignmentName || "ещё не загружен"}
                  </div>
                  <input
                    type="file"
                    onChange={handleUploadAssignment}
                    disabled={loading}
                  />
                </div>
              </div>
            )}

            <hr style={{ margin: "16px 0" }} />

            <div style={{ marginBottom: 12 }}>
              <strong>Сдачи студентов</strong>
              <div style={{ float: "right" }}>
                <button
                  type="button"
                  onClick={handleDownloadAll}
                  disabled={!submissions.length}
                >
                  Скачать все (zip)
                </button>
              </div>
            </div>

            <table>
              <thead>
                <tr>
                  <th>Время</th>
                  <th>Группа</th>
                  <th>Студент</th>
                  <th>Файл</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {submissions.map(function (s) {
                  return (
                    <tr key={s.id}>
                      <td>{new Date(s.uploadedAt).toLocaleTimeString()}</td>
                      <td>{s.group}</td>
                      <td>{s.studentName}</td>
                      <td>{s.originalFilename}</td>
                      <td>
                        <a
                          href={
                            apiBase + "/teacher/submissions/" + s.id + "/download"
                          }
                        >
                          скачать
                        </a>
                      </td>
                    </tr>
                  );
                })}
                {!submissions.length && (
                  <tr>
                    <td colSpan="5" style={{ color: "#9ca3af" }}>
                      Пока нет сдач.
                    </td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<TeacherApp />);
    </script>
  </body>
</html>
